name: Flutter CI

# Se ejecuta en PRs y pushes a estas ramas
on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v3
              with:
                  distribution: "zulu"
                  java-version: "17"

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.19.0" # O tu versión actual
                  channel: "stable"

            - name: Install dependencies
              run: flutter pub get

            - name: Generate code (Build Runner)
              run: flutter pub run build_runner build --delete-conflicting-outputs

            - name: Check formatting
              run: flutter format --set-exit-if-changed lib

            - name: Analyze code (Lints)
              run: flutter analyze

            - name: Run tests
              run: flutter test --coverage

            # Opcional: Puedes subir el reporte de cobertura a Codecov o similar aquí
